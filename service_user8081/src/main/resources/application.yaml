spring:
  application:
    name: service-user8081
  datasource:
    url: jdbc:mysql://localhost:3306/bank?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  redis:
    host: localhost
    port: 6379
    password:          # 没密码就空着
    database: 0
    timeout: 3000ms
server:
  port: 8081
  servlet:
    session:
      timeout: 30m          # 30 分钟无操作过期
      cookie:
        name: USERSESSIONID # Cookie 名字
        http-only: true
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.leandro.entity
  configuration:
    map-underscore-to-camel-case: true
eureka:
  instance:
    hostname: localhost
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
