<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>8081 Redis 登录缓存测试</title>
  <style>
    body { font-family: sans-serif; max-width: 560px; margin: 40px auto; }
    input, button { margin: 6px 0; padding: 8px; width: 100%; box-sizing: border-box; }
    pre { background: #f5f5f5; padding: 12px; white-space: pre-wrap; word-break: break-all; }
    .tip { color: #666; font-size: 14px; }
  </style>
</head>
<body>
  <h2>8081 Session + Redis 登录缓存</h2>
  <p class="tip">请通过 http://localhost:8081/login-test.html 打开（不要用 file://）</p>
  <label>用户名 <input id="username" value="u001" /></label>
  <label>密码 <input id="password" type="password" value="123" /></label>
  <button onclick="doLogin()">1. 登录（写 Session + Redis）</button>
  <button onclick="doMe()">2. 查看当前登录（优先读 Redis）</button>
  <button onclick="doLogout()">3. 退出（删 Redis + Session）</button>
  <pre id="out">等待操作...</pre>
  <script>
    const out = document.getElementById('out');
    async function doLogin() {
      const body = new URLSearchParams({
        username: document.getElementById('username').value,
        password: document.getElementById('password').value
      });
      const res = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        credentials: 'include',
        body
      });
      out.textContent = JSON.stringify(await res.json(), null, 2);
    }
    async function doMe() {
      const res = await fetch('/getLoginUser', { credentials: 'include' });
      out.textContent = JSON.stringify(await res.json(), null, 2);
    }
    async function doLogout() {
      const res = await fetch('/logout', { method: 'POST', credentials: 'include' });
      out.textContent = JSON.stringify(await res.json(), null, 2);
    }
  </script>
</body>
</html>
